services:
  dotnetcameroon.app:
    image: djoufson/dotnetcameroon
    restart: unless-stopped
    container_name: dotnetcameroon
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:18889
    ports:
      - "${APP_PORT:-5000}:8080"
  dotnetcameroon.sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dotnetcameroon.sqlserver
    user: root
    hostname: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "${MSSQL_PID:-Evaluation}"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
  dotnetcameroon.minio:
    image: minio/minio:latest
    container_name: dotnetcameroon.minio
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
volumes:
  sqlserver-data:
  minio-data:
